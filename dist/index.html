<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siege Worlds Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Slideshow Background -->
  <div id="slideshow">
    <img class="slide active" src="img/background.jpg" alt="" />
    <img class="slide" src="img/swlauncher_2.jpg" alt="" />
    <img class="slide" src="img/swlauncher_3.jpg" alt="" />
  </div>

  <!-- Dark Overlay -->
  <div id="overlay"></div>

  <!-- Main Content -->
  <div id="app">
    <div id="header">
      <div id="user-area">
        <div id="signed-out">
          <button id="btn-signin" class="btn btn-secondary">Sign In</button>
        </div>
        <div id="signed-in" style="display:none">
          <div id="user-cic"></div>
          <span id="user-name"></span>
          <button id="btn-signout" class="btn btn-small">Sign Out</button>
        </div>
        <button id="btn-settings" class="btn btn-icon" title="Settings" style="display:none">&#9881;</button>
      </div>
    </div>

    <div id="center"></div>

    <div id="controls">
      <div id="path-row">
        <label>Install Path:</label>
        <input type="text" id="install-path" readonly />
        <button id="btn-browse" class="btn btn-secondary">Browse</button>
      </div>

      <div id="progress-container" style="display:none">
        <div id="progress-info">
          <span id="progress-file"></span>
          <span id="progress-size"></span>
        </div>
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <span id="progress-text">0%</span>
      </div>

      <div id="action-row">
        <button id="btn-check" class="btn btn-secondary">Check Updates</button>
        <button id="btn-play" class="btn btn-primary">PLAY</button>
      </div>

      <div id="console">
        <div id="console-log"></div>
      </div>
    </div>
  </div>

  <!-- Admin / Settings Panel (full overlay) -->
  <div id="settings-panel" style="display:none">
    <!-- Tabs at top -->
    <div id="panel-tabs">
      <button class="panel-tab active" data-tab="tab-settings">Settings</button>
      <button class="panel-tab" data-tab="tab-slides" id="tab-slides-btn" style="display:none">Slideshow</button>
      <div id="panel-close-area"><button id="btn-panel-close" class="btn btn-icon" title="Close">&#10005;</button></div>
    </div>

    <!-- Tab 1: Settings -->
    <div id="tab-settings" class="tab-content active">
      <div class="setting-group" style="margin-bottom:20px;">
        <label>Launcher Greeting</label>
        <input type="text" id="set-greeting" placeholder="Launcher ready." />
      </div>
      <div class="settings-grid">
        <div class="setting-group">
          <label>Build Server URL</label>
          <input type="text" id="set-build-url" />
        </div>
        <div class="setting-group">
          <label>SSO URL</label>
          <input type="text" id="set-sso-url" />
        </div>
      </div>
      <div id="settings-buttons">
        <button id="btn-settings-save" class="btn btn-primary">Save</button>
        <button id="btn-settings-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <!-- Tab 2: Slideshow Manager (admin only) -->
    <div id="tab-slides" class="tab-content">
      <p class="slides-desc">Drag to reorder. Up to 6 slides. Changes go live immediately.</p>
      <div id="slides-grid"></div>
      <div id="slides-actions">
        <span id="slides-status"></span>
        <label id="btn-upload-slide" class="btn btn-primary">
          Upload Image
          <input type="file" id="slide-file-input" accept="image/jpeg,image/png,image/webp" style="display:none" />
        </label>
      </div>
    </div>
  </div>

  <!-- Replace Slide Modal -->
  <div id="replace-modal" style="display:none">
    <div id="replace-modal-content">
      <h3>Replace Slide</h3>
      <div id="replace-preview"></div>
      <div id="replace-actions">
        <label id="btn-replace-file" class="btn btn-primary">
          Choose New Image
          <input type="file" id="replace-file-input" accept="image/jpeg,image/png,image/webp" style="display:none" />
        </label>
        <button id="btn-replace-cancel" class="btn btn-secondary">Cancel</button>
      </div>
      <div id="replace-status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
